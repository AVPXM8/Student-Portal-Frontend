# fly.toml app configuration file generated by antigravity for Next.js

app = 'student-next-portal'
primary_region = 'maa' # Madras, India (since the user's local time is +05:30)

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory_mb = 512
